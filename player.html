<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ユーチューブらくらく管理 Player</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #0f172a;
        color: #f8fafc;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 16px 20px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      }

      h1 {
        margin: 0;
        font-size: 18px;
      }

      a {
        color: #f8fafc;
        text-decoration: none;
      }

      .player-shell {
        display: grid;
        place-items: center;
        padding: 20px;
      }

      .confirm-card {
        display: grid;
        gap: 18px;
        max-width: 880px;
        width: 100%;
      }

      .thumbnail {
        aspect-ratio: 16 / 9;
        border-radius: 8px;
        background: #020617;
        display: grid;
        overflow: hidden;
        place-items: center;
      }

      .thumbnail img {
        display: block;
        height: 100%;
        object-fit: cover;
        width: 100%;
      }

      .thumbnail span {
        color: rgba(255, 255, 255, 0.7);
        font-size: 48px;
      }

      .copy {
        display: grid;
        gap: 10px;
      }

      .copy h2 {
        font-size: 24px;
        line-height: 1.4;
        margin: 0;
      }

      .copy p {
        color: #cbd5e1;
        line-height: 1.7;
        margin: 0;
      }

      .action-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .primary-button,
      .secondary-button {
        align-items: center;
        border-radius: 8px;
        display: inline-flex;
        font-weight: 800;
        justify-content: center;
        min-height: 44px;
        padding: 0 16px;
      }

      .primary-button {
        background: #ef4444;
        color: #fff;
      }

      .secondary-button {
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
      }

      .error {
        color: #fecaca;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>ユーチューブらくらく管理 Player</h1>
        <a id="youtubeLink" href="#" target="_blank" rel="noreferrer">YouTubeで開く</a>
      </header>
      <section class="player-shell" id="playerShell"></section>
    </main>

    <script>
      const params = new URLSearchParams(location.search);
      const videoId = params.get("v");
      const title = params.get("title") || "YouTube動画";
      const thumbnail = params.get("thumb") || (videoId ? `https://i.ytimg.com/vi/${encodeURIComponent(videoId)}/hqdefault.jpg` : "");
      const shell = document.querySelector("#playerShell");
      const youtubeLink = document.querySelector("#youtubeLink");
      const escapeHtml = (value) => String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;",
      }[char]));

      if (!videoId || !/^[a-zA-Z0-9_-]{6,}$/.test(videoId)) {
        shell.innerHTML = '<p class="error">動画IDを取得できませんでした。</p>';
        youtubeLink.style.display = "none";
      } else {
        const watchUrl = `https://www.youtube.com/watch?v=${encodeURIComponent(videoId)}`;
        youtubeLink.href = watchUrl;
        shell.innerHTML = `
          <article class="confirm-card">
            <div class="thumbnail">
              ${thumbnail ? `<img src="${escapeHtml(thumbnail)}" alt="" />` : "<span>▶</span>"}
            </div>
            <div class="copy">
              <h2>${escapeHtml(title)}</h2>
              <p>この画面では動画はまだ再生されません。再生したい場合だけ下のボタンからYouTubeを開きます。</p>
              <div class="action-row">
                <a class="primary-button" href="${watchUrl}" target="_blank" rel="noreferrer">YouTubeで再生</a>
                <a class="secondary-button" href="/">ユーチューブらくらく管理に戻る</a>
              </div>
            </div>
          </article>
        `;
      }
    </script>
  </body>
</html>
